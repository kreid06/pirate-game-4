<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🏝 Island Editor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      overflow: hidden;
      background: #0a1628;
      font-family: 'Courier New', monospace;
      color: #e8d59a;
    }
    #app {
      display: flex;
      width: 100%; height: 100%;
    }
    #sidebar {
      width: 240px;
      flex-shrink: 0;
      background: rgba(10,18,36,0.97);
      border-right: 1px solid rgba(245,200,66,0.25);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      padding: 12px;
      gap: 8px;
      z-index: 10;
    }
    #canvas-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: crosshair;
    }

    h2 { margin: 0 0 4px; font-size: 15px; color: #f5c842; }
    h3 { margin: 0; font-size: 12px; color: rgba(245,200,66,0.6); text-transform: uppercase; letter-spacing: 1px; }
    .sep { border: none; border-top: 1px solid rgba(245,200,66,0.15); margin: 2px 0; }

    label { font-size: 11px; color: rgba(232,213,154,0.6); display: block; margin-bottom: 2px; }

    select, input[type=number] {
      width: 100%;
      background: rgba(0,0,0,0.5);
      color: #e8d59a;
      border: 1px solid rgba(245,200,66,0.3);
      border-radius: 3px;
      padding: 4px 6px;
      font-family: inherit;
      font-size: 12px;
    }

    .btn-row { display: flex; gap: 4px; flex-wrap: wrap; }
    .btn {
      flex: 1;
      background: rgba(30,30,40,0.8);
      color: #c8c0a8;
      border: 1px solid rgba(245,200,66,0.25);
      border-radius: 3px;
      padding: 5px 6px;
      font-family: inherit;
      font-size: 11px;
      cursor: pointer;
      white-space: nowrap;
    }
    .btn:hover { background: rgba(245,200,66,0.15); }
    .btn.active { background: rgba(245,200,66,0.25); color: #f5c842; border-color: rgba(245,200,66,0.6); }
    .btn-danger { color: #e87070; }
    .btn-export {
      width: 100%;
      background: rgba(30,90,30,0.7);
      color: #a8e890;
      border: 1px solid rgba(80,180,60,0.4);
      border-radius: 3px;
      padding: 7px;
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
    }
    .btn-export:hover { background: rgba(40,120,40,0.8); }

    #coords {
      font-size: 11px;
      color: rgba(232,213,154,0.55);
      min-height: 15px;
    }
    #vert-count {
      font-size: 11px;
      color: rgba(232,213,154,0.55);
    }
    .hint {
      font-size: 10px;
      color: rgba(232,213,154,0.4);
      line-height: 1.5;
    }

    #import-area {
      width: 100%;
      height: 80px;
      background: rgba(0,0,0,0.4);
      color: #e8d59a;
      border: 1px solid rgba(245,200,66,0.2);
      border-radius: 3px;
      font-family: inherit;
      font-size: 10px;
      padding: 4px;
      resize: none;
    }

    /* ── HUD overlays on canvas ── */
    #canvas-hud {
      position: absolute;
      bottom: 8px; left: 8px;
      font-size: 11px;
      color: rgba(255,255,255,0.45);
      pointer-events: none;
    }
  </style>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <h2>🏝 Island Editor</h2>

    <!-- Server connection -->
    <div>
      <h3>Server</h3>
      <div style="display:flex;gap:4px;">
        <input type="text" id="server-url" value="http://localhost:8081"
          style="flex:1;background:rgba(0,0,0,0.5);color:#e8d59a;border:1px solid rgba(245,200,66,0.3);border-radius:3px;padding:4px 6px;font-family:inherit;font-size:11px;"/>
        <button class="btn" id="btn-fetch-server">↺</button>
      </div>
      <div id="server-status" style="font-size:10px;color:rgba(232,213,154,0.5);margin-top:3px;">not connected</div>
    </div>

    <hr class="sep"/>
    <div>
      <label>Island</label>
      <select id="isl-select"></select>
    </div>

    <hr class="sep"/>

    <!-- Layer selector -->
    <div>
      <h3>Layer</h3>
      <div class="btn-row" id="layer-btns"></div>
    </div>

    <!-- Polygon selector (multi-poly layers) -->
    <div id="poly-section">
      <h3>Polygon</h3>
      <div style="display:flex;gap:4px;align-items:center;">
        <select id="poly-select" style="flex:1"></select>
        <button class="btn" id="poly-add" title="New polygon">+</button>
        <button class="btn btn-danger" id="poly-del" title="Delete polygon">–</button>
      </div>
    </div>

    <hr class="sep"/>

    <!-- Edit mode -->
    <div>
      <h3>Mode</h3>
      <div class="btn-row" id="mode-btns"></div>
    </div>

    <hr class="sep"/>

    <!-- Snap -->
    <div>
      <label>Grid snap (0 = off)</label>
      <input type="number" id="snap-input" value="0" min="0" max="500" step="10"/>
    </div>
    <div style="margin-top:5px;display:flex;align-items:center;gap:6px;">
      <input type="checkbox" id="show-grid" checked/>
      <label for="show-grid" style="cursor:pointer;">Show grid lines</label>
    </div>

    <hr class="sep"/>

    <!-- Status -->
    <div id="coords">—</div>
    <div id="vert-count">verts: 0</div>

    <hr class="sep"/>

    <!-- Actions -->
    <div class="btn-row">
      <button class="btn btn-danger" id="btn-clear-poly">🗑 Clear poly</button>
      <button class="btn btn-danger" id="btn-clear-layer">🗑 Clear layer</button>
    </div>
    <button class="btn" id="btn-sand-from-shape" style="width:100%;margin-top:4px;">↺ Reset Sand → Shape</button>
    <button class="btn" id="btn-grass-from-shape" style="width:100%;margin-top:4px;">↺ Reset Grass → Shape×0.82</button>
    <button class="btn" id="btn-shape-from-sand" style="width:100%;margin-top:4px;">↺ Reset Shape → Sand</button>
    <button class="btn" id="btn-shallow-from-sand" style="width:100%;margin-top:4px;">↺ Reset Shallow → Sand</button>

    <hr class="sep"/>

    <!-- Islets -->
    <div>
      <h3>Islets</h3>
      <div style="display:flex;gap:4px;align-items:center;margin-bottom:4px;">
        <select id="sub-isl-select" style="flex:1;font-size:11px;"></select>
        <button class="btn" id="sub-isl-add" title="Add islet">+</button>
        <button class="btn btn-danger" id="sub-isl-del" title="Delete islet">–</button>
      </div>
      <button class="btn" id="sub-isl-edit" style="width:100%;">✏ Edit Islet</button>
      <div id="sub-isl-bar" style="display:none;margin-top:4px;padding:5px 7px;background:rgba(245,200,66,0.12);border:1px solid rgba(245,200,66,0.35);border-radius:3px;font-size:11px;color:#f5c842;">
        ✏ Editing Islet <span id="sub-isl-label">—</span>
        <button class="btn" id="sub-isl-back" style="width:100%;margin-top:4px;">← Main Island</button>
      </div>
    </div>

    <hr class="sep"/>

    <!-- Import JSON -->
    <div>
      <h3>Import polygon JSON</h3>
      <textarea id="import-area" placeholder='[{"x":0,"y":0},...]'></textarea>
      <button class="btn" id="btn-import" style="width:100%;margin-top:4px;">⬆ Import</button>
    </div>

    <hr class="sep"/>

    <!-- Export -->
    <button class="btn-export" id="btn-export">📋 Copy Schema</button>

    <hr class="sep"/>
    <div class="hint">
      LMB: place/drag vertex<br/>
      RMB: delete vertex<br/>
      Middle-drag / Alt+drag: pan<br/>
      Scroll: zoom<br/>
      Del/Backspace: delete hovered
    </div>
  </div>

  <div id="canvas-wrap">
    <canvas id="editor-canvas"></canvas>
    <div id="canvas-hud">scroll to zoom · alt+drag to pan</div>
  </div>
</div>

<script type="module" src="/src/tools/island-editor-main.ts"></script>
</body>
</html>
