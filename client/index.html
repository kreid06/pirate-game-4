<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🏴‍☠️ Pirate Game</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000033;
        touch-action: none;
      }

      #canvas-wrapper {
        position: fixed;
        inset: 0;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        background: #000033;
      }

      #zoom-controls {
        position: absolute;
        right: 45px;
        bottom: 104px;
        display: flex;
        flex-direction: column;
        gap: 4px;
        z-index: 10;
      }
    </style>
  </head>
  <body>
    <div id="canvas-wrapper">
      <canvas id="gameCanvas"></canvas>
      <div id="zoom-controls">
        <button id="zoom-in-btn" title="Zoom In" style="width:36px;height:36px;font-size:20px;font-weight:bold;background:rgba(0,0,0,0.65);color:#fff;border:1px solid #666;border-radius:6px;cursor:pointer;line-height:1;">+</button>
        <button id="zoom-out-btn" title="Zoom Out" style="width:36px;height:36px;font-size:20px;font-weight:bold;background:rgba(0,0,0,0.65);color:#fff;border:1px solid #666;border-radius:6px;cursor:pointer;line-height:1;">−</button>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
