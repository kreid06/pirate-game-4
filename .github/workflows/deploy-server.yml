name: Deploy Server

on:
  push:
    branches:
      - main
    paths:
      - 'server/**'
      - 'protocol/**'
      - '.github/workflows/deploy-server.yml'
      - 'server/auth/**'
  workflow_dispatch:  # Allows manual trigger from GitHub Actions UI

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup SSH key
        env:
          SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          # Debug: Check key format
          echo "=== SSH Key File Info ==="
          ls -la ~/.ssh/id_rsa
          echo "=== First/Last lines of key ==="
          head -n 1 ~/.ssh/id_rsa
          tail -n 1 ~/.ssh/id_rsa
          echo "=== Key validation ==="
          ssh-keygen -l -f ~/.ssh/id_rsa || {
            echo "ERROR: SSH key is invalid!"
            echo "Key might be missing BEGIN/END markers or has formatting issues"
            exit 1
          }
          
          # Add known hosts
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts
          
      - name: Test SSH connection
        run: |
          echo "=== Testing SSH connection ==="
          ssh -vvv -o StrictHostKeyChecking=no -o BatchMode=yes ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "echo 'SSH connection successful!'" || {
            echo "ERROR: SSH connection failed!"
            echo "Please verify:"
            echo "1. The public key is added to ~/.ssh/authorized_keys on the server"
            echo "2. SERVER_USER is correct (check if it should be 'root' or 'u123456789' format)"
            echo "3. SSH is enabled on the Hostinger VPS"
            exit 1
          }
        
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libssl-dev
          
      - name: Build auth server
        run: |
          cd server/auth
          npm ci
          npm run build
          
      - name: Build server
        run: |
          cd server
          mkdir -p build
          cd build
          cmake -DCMAKE_BUILD_TYPE=Release ..
          make -j$(nproc)
          
      - name: Strip debug symbols
        run: |
          cd server/build
          strip pirate-server  # Remove debug symbols for smaller binary
          
      - name: Deploy to server
        run: |
          # Create directories
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "sudo mkdir -p /opt/pirate-game/bin /opt/pirate-game/config /opt/pirate-game/auth"
          
          # Copy binary to temp location, then move with sudo
          scp -o StrictHostKeyChecking=no server/build/pirate-server ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/tmp/pirate-server
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "sudo mv /tmp/pirate-server /opt/pirate-game/bin/pirate-server && sudo chmod +x /opt/pirate-game/bin/pirate-server"
          
          # Copy config to temp location, then move with sudo
          scp -o StrictHostKeyChecking=no server/config/server.conf ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/tmp/server.conf
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "sudo mv /tmp/server.conf /opt/pirate-game/config/server.conf"

          # Deploy auth server dist + package.json
          scp -o StrictHostKeyChecking=no -r server/auth/dist ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/tmp/auth-dist
          scp -o StrictHostKeyChecking=no server/auth/package.json ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/tmp/auth-package.json
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "
            sudo rm -rf /opt/pirate-game/auth/dist &&
            sudo mv /tmp/auth-dist /opt/pirate-game/auth/dist &&
            sudo mv /tmp/auth-package.json /opt/pirate-game/auth/package.json &&
            sudo chown -R \$USER:\$USER /opt/pirate-game/auth &&
            cd /opt/pirate-game/auth && npm ci --omit=dev
          "

          # Write auth.env from GitHub secrets (overwrites placeholder values from setup-server.sh)
          {
            echo "AUTH_PORT=3001"
            echo "JWT_SECRET=${{ secrets.AUTH_JWT_SECRET }}"
            echo "CORS_ORIGINS=${{ secrets.AUTH_CORS_ORIGINS }}"
          } > /tmp/auth.env
          scp -o StrictHostKeyChecking=no /tmp/auth.env ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/tmp/auth.env
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "sudo mv /tmp/auth.env /opt/pirate-game/config/auth.env && sudo chmod 600 /opt/pirate-game/config/auth.env"
          
      - name: Restart server services
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
            sudo systemctl restart pirate-server || echo "Game service restart failed (may not exist yet)"
            sudo systemctl restart pirate-auth   || echo "Auth service restart failed (may not exist yet)"
            sleep 2
            sudo systemctl status pirate-server || echo "Game service not running yet"
            sudo systemctl status pirate-auth   || echo "Auth service not running yet"
          EOF
